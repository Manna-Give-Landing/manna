<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 580" fill="none">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="560" rx="36" fill="#0F1B2D" stroke="#1E2D42" stroke-width="2"/>
  <rect x="20" y="20" width="260" height="540" rx="28" fill="#FAFBFC"/>
  <!-- Notch -->
  <rect x="100" y="20" width="100" height="26" rx="13" fill="#0F1B2D"/>
  <!-- Status bar -->
  <text x="40" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600">6:32</text>
  <!-- App bar - navy -->
  <rect x="20" y="68" width="260" height="48" fill="#1A3A5C"/>
  <!-- Yellow avatar circle -->
  <circle cx="48" cy="92" r="14" fill="#FBBF24"/>
  <text x="48" y="97" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" text-anchor="middle" font-weight="700">L</text>
  <!-- MANNA text center -->
  <text x="150" y="97" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" font-weight="700" text-anchor="middle" letter-spacing="2">MANNA</text>
  <!-- Bell icon -->
  <circle cx="254" cy="92" r="12" fill="none"/>
  <text x="254" y="97" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle">&#x1F514;</text>

  <!-- Wallet card with gradient -->
  <defs>
    <linearGradient id="walletGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f7bf7"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect x="36" y="132" width="228" height="150" rx="16" fill="url(#walletGrad)"/>
  <!-- MANNA on card -->
  <text x="56" y="164" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" font-weight="700" letter-spacing="2">MANNA</text>
  <!-- Contactless -->
  <g transform="translate(232,148)" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5">
    <path d="M0 8a6 6 0 0 1 4-5.5"/>
    <path d="M0 8a10 10 0 0 1 7-9.5"/>
  </g>
  <!-- Available Balance -->
  <text x="56" y="192" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Available Balance</text>
  <text x="56" y="228" font-family="Inter, system-ui, sans-serif" font-size="32" fill="white" font-weight="700">$500.00</text>
  <!-- Card number -->
  <text x="56" y="253" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Card Number</text>
  <text x="56" y="270" font-family="Inter, system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="1">&#x2022;&#x2022;&#x2022;&#x2022; &#x2022;&#x2022;&#x2022;&#x2022; &#x2022;&#x2022;&#x2022;&#x2022; 0000</text>
  <!-- Pending badge -->
  <rect x="188" y="256" width="64" height="20" rx="10" fill="rgba(255,255,255,0.15)"/>
  <circle cx="200" cy="266" r="3" fill="#FBBF24"/>
  <text x="210" y="270" font-family="Inter, system-ui, sans-serif" font-size="9" fill="white">Pending</text>

  <!-- Action buttons row -->
  <g transform="translate(56, 306)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#F0F2F5"/>
    <text x="26" y="32" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#0F1B2D" text-anchor="middle">&#x1F552;</text>
    <text x="26" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6" text-anchor="middle">History</text>
  </g>
  <g transform="translate(124, 306)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#F0F2F5"/>
    <text x="26" y="32" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#0F1B2D" text-anchor="middle">&#x2197;</text>
    <text x="26" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6" text-anchor="middle">Share</text>
  </g>
  <g transform="translate(192, 306)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#F0F2F5"/>
    <text x="26" y="32" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#0F1B2D" text-anchor="middle">&#x1F4B3;</text>
    <text x="26" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6" text-anchor="middle">Card Info</text>
  </g>

  <!-- Recent Activity -->
  <text x="36" y="410" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#0F1B2D" font-weight="600">Recent Activity</text>
  <text x="228" y="410" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#2563EB" font-weight="500">See all</text>
  <!-- Activity row -->
  <rect x="36" y="424" width="228" height="52" rx="12" fill="#F7F9FB"/>
  <circle cx="56" cy="450" r="12" fill="#FEE2E2"/>
  <text x="56" y="454" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#EF4444" text-anchor="middle">&#x2191;</text>
  <text x="76" y="446" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8896A6">3/6/2026</text>
  <text x="240" y="454" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0F1B2D" font-weight="600" text-anchor="end">-$500.00</text>

  <!-- SMS info -->
  <rect x="36" y="490" width="228" height="48" rx="10" fill="#F7F9FB" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="56" y="512" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0F1B2D" font-weight="600">Check Balance via SMS</text>
  <text x="56" y="526" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8896A6">Text BAL 0000 to 1-800-MANNA</text>

  <!-- Tab bar -->
  <rect x="20" y="520" width="260" height="40" fill="white"/>
  <rect x="20" y="518" width="260" height="1" fill="#E8ECF0"/>
</svg>
