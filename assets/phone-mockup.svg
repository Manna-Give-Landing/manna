<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 580" fill="none">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="560" rx="36" fill="#0F1B2D" stroke="#1E2D42" stroke-width="2"/>
  <rect x="20" y="20" width="260" height="540" rx="28" fill="#FAFBFC"/>
  <!-- Notch -->
  <rect x="100" y="20" width="100" height="26" rx="13" fill="#0F1B2D"/>
  <!-- Status bar -->
  <text x="40" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600">9:41</text>
  <!-- Header -->
  <text x="110" y="90" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#0F1B2D" font-weight="700">Manna</text>
  <!-- Balance card -->
  <rect x="36" y="110" width="228" height="100" rx="16" fill="#0F1B2D"/>
  <text x="52" y="138" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6">Total Given</text>
  <text x="52" y="168" font-family="Inter, system-ui, sans-serif" font-size="24" fill="white" font-weight="700">$1,240.00</text>
  <text x="180" y="168" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#2ECC71" font-weight="600">+12.4%</text>
  <rect x="52" y="184" width="60" height="18" rx="9" fill="#1E2D42"/>
  <text x="63" y="196" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ECC71">Dashboard</text>
  <!-- Action buttons -->
  <circle cx="75" cy="244" r="22" fill="#2ECC71"/>
  <text x="75" y="248" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle">+</text>
  <text x="75" y="280" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8896A6" text-anchor="middle">Give</text>
  <circle cx="150" cy="244" r="22" fill="#F0F2F5"/>
  <text x="150" y="249" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#0F1B2D" text-anchor="middle">&#x2191;</text>
  <text x="150" y="280" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8896A6" text-anchor="middle">Send</text>
  <circle cx="225" cy="244" r="22" fill="#F0F2F5"/>
  <text x="225" y="249" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#0F1B2D" text-anchor="middle">&#x2193;</text>
  <text x="225" y="280" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8896A6" text-anchor="middle">History</text>
  <!-- Transactions -->
  <text x="36" y="316" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0F1B2D" font-weight="600">Recent Activity</text>
  <text x="218" y="316" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#2ECC71">See All</text>
  <!-- Row 1 -->
  <rect x="36" y="330" width="228" height="50" rx="10" fill="#F7F9FB"/>
  <circle cx="58" cy="355" r="14" fill="#E8F5EE"/>
  <text x="58" y="359" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#2ECC71" text-anchor="middle">&#x2713;</text>
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600">Maria's Fund</text>
  <text x="80" y="364" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8896A6">Mar 12, 2026</text>
  <text x="236" y="352" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600" text-anchor="end">-$50.00</text>
  <text x="236" y="366" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ECC71" text-anchor="end">Completed</text>
  <!-- Row 2 -->
  <rect x="36" y="390" width="228" height="50" rx="10" fill="#F7F9FB"/>
  <circle cx="58" cy="415" r="14" fill="#E8F5EE"/>
  <text x="58" y="419" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#2ECC71" text-anchor="middle">&#x2713;</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600">Community Aid</text>
  <text x="80" y="424" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8896A6">Mar 10, 2026</text>
  <text x="236" y="412" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600" text-anchor="end">-$25.00</text>
  <text x="236" y="426" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ECC71" text-anchor="end">Completed</text>
  <!-- Row 3 -->
  <rect x="36" y="450" width="228" height="50" rx="10" fill="#F7F9FB"/>
  <circle cx="58" cy="475" r="14" fill="#E8F5EE"/>
  <text x="58" y="479" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#2ECC71" text-anchor="middle">&#x2713;</text>
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600">Direct Support</text>
  <text x="80" y="484" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8896A6">Mar 8, 2026</text>
  <text x="236" y="472" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600" text-anchor="end">-$100.00</text>
  <text x="236" y="486" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2ECC71" text-anchor="end">Completed</text>
  <!-- Tab bar -->
  <rect x="20" y="520" width="260" height="40" rx="0" fill="white"/>
  <rect x="20" y="518" width="260" height="1" fill="#E8ECF0"/>
  <circle cx="75" cy="540" r="10" fill="#E8F5EE"/>
  <circle cx="150" cy="540" r="10" fill="#F0F2F5"/>
  <circle cx="225" cy="540" r="10" fill="#F0F2F5"/>
</svg>
