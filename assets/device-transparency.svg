<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 580" fill="none">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="560" rx="36" fill="#0F1B2D" stroke="#1E2D42" stroke-width="2"/>
  <rect x="20" y="20" width="260" height="540" rx="28" fill="#FAFBFC"/>
  <!-- Notch -->
  <rect x="100" y="20" width="100" height="26" rx="13" fill="#0F1B2D"/>
  <!-- Status bar -->
  <text x="40" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#0F1B2D" font-weight="600">6:24</text>

  <!-- App bar -->
  <rect x="20" y="68" width="260" height="48" fill="#1A3A5C"/>
  <text x="40" y="97" font-family="Inter, system-ui, sans-serif" font-size="16" fill="white">&lt;</text>
  <text x="150" y="97" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" font-weight="700" text-anchor="middle" letter-spacing="2">MANNA</text>

  <!-- Title -->
  <text x="36" y="148" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8896A6">Choose how you'd like to use MANNA</text>

  <!-- Donor card (selected) -->
  <rect x="36" y="168" width="228" height="80" rx="12" fill="white" stroke="#2563EB" stroke-width="2"/>
  <!-- Heart icon circle -->
  <rect x="52" y="184" width="40" height="40" rx="10" fill="#EFF6FF"/>
  <text x="72" y="210" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#2563EB" text-anchor="middle">&#x2661;</text>
  <!-- Text -->
  <text x="104" y="204" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0F1B2D" font-weight="600">Donor</text>
  <text x="104" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6">I want to give directly to people in need</text>
  <!-- Radio filled -->
  <circle cx="244" cy="208" r="10" fill="none" stroke="#2563EB" stroke-width="2"/>
  <circle cx="244" cy="208" r="5" fill="#2563EB"/>

  <!-- Recipient card -->
  <rect x="36" y="264" width="228" height="90" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="52" y="280" width="40" height="40" rx="10" fill="#F7F9FB"/>
  <text x="72" y="306" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#0F1B2D" text-anchor="middle">&#x1F464;</text>
  <text x="104" y="298" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0F1B2D" font-weight="600">Recipient</text>
  <text x="104" y="314" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6">I have an invite code from a partner</text>
  <text x="104" y="332" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2563EB">&#x1F511; Invite code required</text>
  <circle cx="244" cy="308" r="10" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Organization card -->
  <rect x="36" y="370" width="228" height="90" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="52" y="386" width="40" height="40" rx="10" fill="#F7F9FB"/>
  <text x="72" y="412" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#0F1B2D" text-anchor="middle">&#x1F3E2;</text>
  <text x="104" y="404" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0F1B2D" font-weight="600">Organization</text>
  <text x="104" y="420" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6">I represent a partner organization</text>
  <text x="104" y="438" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#2563EB">&#x1F511; Invite code required</text>
  <circle cx="244" cy="414" r="10" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Helper text -->
  <text x="36" y="490" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8896A6">Don't have an invite code? <tspan fill="#2563EB">Contact your organization</tspan></text>

  <!-- Continue button -->
  <rect x="36" y="514" width="228" height="44" rx="12" fill="#1A3A5C"/>
  <text x="150" y="541" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" font-weight="600" text-anchor="middle">Continue</text>
</svg>
