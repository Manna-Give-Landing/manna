<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" fill="none">
  <!-- Card body -->
  <rect x="0" y="0" width="340" height="220" rx="14" fill="white" stroke="#E2E8F0" stroke-width="1"/>
