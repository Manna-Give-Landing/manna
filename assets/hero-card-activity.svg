    <text x="44" y="12" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8896A6">3/4/2026</text>
    <text x="240" y="12" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0F1B2D" font-weight="600" text-anchor="end">-$120.00</text>
    <text x="44" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8896A6">Community Fund</text>
