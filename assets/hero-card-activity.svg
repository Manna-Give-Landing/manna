    <text x="44" y="12" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8896A6">3/6/2026</text>
    <text x="240" y="12" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0F1B2D" font-weight="600" text-anchor="end">-$500.00</text>
    <text x="44" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8896A6">Direct Support</text>
    <text x="240" y="28" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#2ECC71" text-anchor="end">Completed</text>
  </g>
  <!-- Divider -->
  <rect x="24" y="108" width="292" height="1" fill="#F0F2F5"/>
