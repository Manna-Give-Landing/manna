    <text x="16" y="21" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#2ECC71" text-anchor="middle">&#x2713;</text>
    <text x="44" y="12" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8896A6">3/1/2026</text>
